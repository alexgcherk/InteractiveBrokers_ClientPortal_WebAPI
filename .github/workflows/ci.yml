name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Unit Tests
        run: dotnet test IB.ClientPortal.Client.UnitTests --no-build -c Release --logger "console;verbosity=normal"

      - name: Verify pack (dry-run)
        run: dotnet pack IB.ClientPortal.Client/IB.ClientPortal.Client.csproj --no-build -c Release -o ./nupkg
