name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'   # trigger on any version tag, e.g. v1.0.0, v1.2.3-beta.1

jobs:
  publish:
    name: Pack & Push
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history required for SourceLink

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Unit Tests
        run: dotnet test IB.ClientPortal.Client.UnitTests --no-build -c Release

      - name: Derive version from tag
        id: version
        # Strip leading 'v' from the tag name: v1.2.3 → 1.2.3
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Pack
        run: |
          dotnet pack IB.ClientPortal.Client/IB.ClientPortal.Client.csproj \
            --no-build -c Release \
            -p:Version=${{ steps.version.outputs.VERSION }} \
            -o ./nupkg

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Push symbols to NuGet.org
        run: |
          dotnet nuget push ./nupkg/*.snupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
